services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: fahad1000mir/nowlii-backend:dev
    container_name: nowlii-backend
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DEBUG=False
      # DB config (DB_ENGINE, DB_NAME, DB_USER, DB_PASSWORD, DB_HOST, DB_PORT)
      # is injected from .env and connects to AWS RDS PostgreSQL.
      # No local postgres container or db_data volume needed.
    restart: always

volumes:
  static_volume:
  media_volume:
